<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} | MD SALMAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black">

    <div class="bg-black text-light">
        <!-- File Name -->
        <div class="justify-content-center align-items-center w-100 d-flex">
            <div id="file-name" class="text-center text-lg max:w-74 p-2 flex-wrap justify-content-center items-center">
                <p class="fw-bold"> 
                    <span id="myDiv" class="h6 flex-wrap text-center justify-content-center items-center card-title wow animate__animated animate__fadeInRight">
                        {{file_name}}
                    </span>
                </p>
            </div>
        </div>
        
        <!-- Online Video Player -->
        <div class="justify-content-center align-items-center w-100 d-flex flex-wrap">
            <div class="lg:w-9/12 lg:px-12 lg:py-4 w-full border border-danger wow animate__animated animate__fadeInLeft">
                <video id="player" class="player" playsinline controls>
                    <source src="{{file_url}}" type="video/mp4">
                </video>
            </div>
        </div>

        <!-- Download Button Section -->
        <div class="justify-content-center align-items-center w-100 d-flex p-4">
            <div class="row d-flex w-100 justify-content-center align-items-center">
                <div onclick="lazyDownload()" class="col-lg-4 p-3 col-12 rounded-3xl bg-dark text-white text-center align-items-center hover:bg-gradient-to-r from-pink-500 to-violet-500 hover:shadow-md hover:shadow-gray-100 hover:translate-y-[-5px] transition transition-all duration-300 wow animate__animated animate__rubberBand">
                    Download Now
                </div>
            </div>
        </div>

        <!-- Warning Messages -->
        <div class="justify-content-center align-items-center w-100 d-flex mb-3">
            <div class="row d-flex w-100 justify-content-center align-items-center">
                <div class="col-lg-8 col-10 py-2 text-center bg-danger rounded-4 text-sm wow animate__animated animate__fadeIn">
                    Video not playing? Possibly because your browser or the player doesn't support the codec. Please download and watch.
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark justify-content-around align-items-center">
        <hr>
        <div class="text-center text-xs p-3 text-light gap-2" style="background-color: rgba(0, 0, 0, 0.2);">
            © <script type="text/JavaScript">
                var theDate=new Date() 
                document.write(theDate.getFullYear()) 
            </script> Copyright :
            <span class="bg-clip-text text-[16px] text-transparent bg-gradient-to-r from-pink-500 to-violet-500 font-bold tracking-wide px-1">MD SALMAN</span>
            All rights reserved.
        </div>   
    </footer>

    <script src="js/wow.min.js"></script>
    <script>
        new WOW().init();
    </script>
    <script>
        var div = document.getElementById('myDiv');
        var text = div.textContent;
        if(text.length > 60){
            div.textContent = text.slice(0, 60) + "....";
        }
    </script>
    
    <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
    <script>
        const controls = [
            'play-large', 'rewind', 'play', 'fast-forward', 'progress', 
            'current-time', 'duration', 'mute', 'volume', 'captions', 
            'settings', 'pip', 'airplay', 'download', 'fullscreen'
        ];
        document.addEventListener('DOMContentLoaded', () => {
            const player = Plyr.setup('.player', { controls });
        });
    </script>
    
    <!-- Right click disable -->
    <script>
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
        document.addEventListener('keydown', function (e) {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.key === 'u') ||
                e.ctrlKey ||
                e.shiftKey ||
                e.altKey
            ) {
                e.preventDefault();
            }
        });
    </script>
    
    <script>
        function lazyDownload() {
            const videolink = window.location.href;
            const lazyLink = videolink.replace("/watch/", "/");
            window.location.href = lazyLink;
        }
    </script>

</body>
</html>
